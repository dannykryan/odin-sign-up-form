<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/odin-sign-up-form/styles.css">
  <title>Sign In Form</title>
</head>
<body>
  <div class="container">
    <div class="border">
      <div id="logo-box">
        <img id="odin-logo" src="./assets/odin-lined-logo.png" alt="Odin logo">
        <h1>Odin</h1>
      </div>
    </div>
    <div class="main-section">
      <div class="main-content">
        <div class="notice">
          <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
          <p>Sign up <em>now</em> to get started.</p>
          <p>You <em>know</em> you want to.</p>
        </div>
        <div class="sign-up-form">
          <form action="example.com/path" method="post">
            <div class="form-content">
              <h3>Let's do this!</h3>
              <div class="divider-row">
                <div class="form-group">
                  <label for="first-name">First Name</label>
                  <input id="first-name" type="text" placeholder="First Name">
                </div>
                <div class="form-group">
                  <label for="last-name">Last Name</label>
                  <input id="last-name" type="text" placeholder="Last Name">
                </div>
              </div>
              <div class="divider-row">
                <div class="form-group">
                  <label for="email">Email</label>
                  <input id="email" type="email" placeholder="Email" autocomplete="email">
                </div>
                <div class="form-group">
                  <label for="phone">Phone Number</label>
                  <input id="phone" type="tel" placeholder="Phone Number" autocomplete="tel">
                </div>
              </div>
              <div class="divider-row">
                <div class="form-group">
                  <label for="password">Password</label>
                  <input id="password" type="password" placeholder="Password" autocomplete="new-password">
                </div>
                <div class="form-group">
                  <label for="confirm-password">Confirm Password</label>
                  <input id="confirm-password" type="password" placeholder="Confirm Password" autocomplete="new-password">
                </div>
              </div>
            </div>
            <button type="submit">Create Account</button>

            <p class="account-check">Already have an account? <a href="#">Sign in</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
